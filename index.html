<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Loan Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .app {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .schedule-section {
      background: white;
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: none;
    }
    .schedule-section.show { display: block; }

    .form-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .form-top h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 4px;
    }
    .form-top .subtitle {
      color: #777;
      font-size: 14px;
    }
    .save-btn {
      background: #f0f0f0;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      padding: 10px 20px;
      border-radius: 8px;
      width: auto;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #e4e4e4; }
    .save-msg {
      font-size: 12px;
      color: #27ae60;
      position: absolute;
      right: 0;
      top: 100%;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-msg.show { opacity: 1; }

    .form-fields {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
      background: white;
    }
    input:focus, select:focus { border-color: #667eea; }
    .input-suffix { position: relative; }
    .input-suffix input { padding-right: 44px; }
    .input-suffix::after {
      content: attr(data-suffix);
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 16px;
    }

    .events-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .events-row .event-col {
      flex: 1;
    }
    .event-col .section-label {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      margin-bottom: 10px;
    }
    .event-entry {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .event-entry input[type="date"] {
      width: 150px;
      padding: 8px 10px;
      font-size: 13px;
      flex-shrink: 0;
    }
    .event-entry input[type="number"] {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
    }
    .event-entry .danger {
      flex-shrink: 0;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    button {
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button.outline {
      background: transparent;
      border: 2px dashed #ccc;
      color: #888;
      font-size: 13px;
      padding: 8px 14px;
      width: auto;
    }
    button.outline:hover { border-color: #667eea; color: #667eea; background: #f8f9ff; }
    button.danger {
      background: transparent;
      color: #e74c3c;
      padding: 4px 10px;
      font-size: 16px;
      width: auto;
      margin: 0;
    }
    button.danger:hover { background: #fdecea; }
    button.calc-btn {
      min-width: 200px;
    }
    .error { color: #e74c3c; font-size: 13px; margin-top: 8px; }

    .results {
      padding: 16px 20px;
      background: #f8f9ff;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.3s;
      margin-top: 12px;
    }
    .results.show { opacity: 1; }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }
    .result-label { color: #777; font-size: 13px; }
    .result-value { font-weight: 700; color: #333; font-size: 15px; }
    .result-value.highlight { color: #667eea; font-size: 18px; }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-item {
      background: #f8f9ff;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .summary-item .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .summary-item .value {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }
    .summary-item .value.paid { color: #27ae60; }
    .summary-item .value.left { color: #e74c3c; }

    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .schedule-header h2 { font-size: 20px; color: #333; }
    .schedule-header span { font-size: 14px; color: #777; }
    .schedule-wrap {
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 8px;
    }
    .schedule-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .schedule-wrap th {
      background: #f8f8f8;
      padding: 10px 12px;
      text-align: right;
      font-weight: 600;
      color: #555;
      position: sticky;
      top: 0;
    }
    .schedule-wrap th:first-child { text-align: center; }
    .schedule-wrap td {
      padding: 8px 12px;
      text-align: right;
      border-top: 1px solid #f0f0f0;
      font-variant-numeric: tabular-nums;
    }
    .schedule-wrap td:first-child { text-align: center; color: #999; }
    .schedule-wrap td:nth-child(2) { text-align: center; color: #666; font-size: 12px; }
    .schedule-wrap tr:nth-child(even) td { background: #fafafa; }
    .schedule-wrap tr.paid td { background: #eafaf1 !important; }
    .schedule-wrap tr.paid td:nth-child(2) { font-weight: 600; color: #27ae60; }
    .schedule-wrap tr.active td { background: #fff9e6 !important; }
    .schedule-wrap tr.active td:nth-child(2) { font-weight: 700; color: #e67e22; }
    .schedule-wrap tr.prepay td { background: #eef2ff !important; }
    .schedule-wrap tr.prepay td:nth-child(2) { font-weight: 600; color: #667eea; }
    .schedule-wrap tr.rate-change td { background: #fff3e0 !important; }
    .schedule-wrap tr.rate-change td:nth-child(2) { font-weight: 600; color: #e67e22; }

    @media (max-width: 1000px) {
      .form-fields { grid-template-columns: 1fr 1fr 1fr !important; }
      .events-row { flex-direction: column; }
      .events-row .event-col { text-align: left !important; }
      .events-row .calc-btn { max-width: none !important; }
      .summary { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .form-card, .schedule-section { padding: 24px 20px; }
      .form-fields { grid-template-columns: 1fr 1fr !important; }
      .form-top { flex-direction: column; gap: 12px; }
      .form-top h1 { font-size: 20px; }
      .schedule-wrap { overflow-x: auto; }
      .schedule-wrap table { min-width: 700px; }
      .event-entry input[type="date"] { width: 130px; }
    }
    @media (max-width: 480px) {
      body { padding: 10px; }
      .app { gap: 16px; }
      .form-card, .schedule-section { padding: 16px 12px; border-radius: 12px; }
      .form-fields { grid-template-columns: 1fr !important; gap: 12px; }
      .form-top h1 { font-size: 18px; }
      .form-top .subtitle { font-size: 13px; }
      .form-top > div:last-child { flex-wrap: wrap; }
      .summary { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .summary-item { padding: 10px; }
      .summary-item .value { font-size: 15px; }
      .schedule-header { flex-direction: column; gap: 8px; align-items: flex-start; }
      .schedule-header span { font-size: 13px; }
      .calc-btn { width: 100% !important; max-width: none !important; }
      .event-entry { gap: 6px; }
      .event-entry input[type="date"] { width: 100%; }
      .events-row { gap: 12px; }
      .event-col .section-label { margin-bottom: 6px; }
      .save-btn { padding: 8px 14px; font-size: 13px; }
      input, select { font-size: 16px; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div class="app">
    <div class="form-card">
      <div class="form-top">
        <div>
          <h1>Home Loan Calculator</h1>
          <p class="subtitle">Calculate your monthly EMI</p>
        </div>
        <div style="display:flex;align-items:center;gap:12px;position:relative">
          <select id="currency" style="width:auto;padding:8px 12px;font-size:14px;border:2px solid #e0e0e0;border-radius:8px;outline:none;background:white;cursor:pointer">
            <option value="$">$ (USD)</option>
            <option value="&#8377;">&#8377; (INR)</option>
            <option value="&#163;">&#163; (GBP)</option>
            <option value="&#8364;">&#8364; (EUR)</option>
            <option value="&#165;">&#165; (JPY)</option>
            <option value="R$">R$ (BRL)</option>
          </select>
          <button class="save-btn" id="saveBtn">Save</button>
          <span class="save-msg" id="saveMsg">Saved!</span>
        </div>
      </div>

      <div class="form-fields" style="grid-template-columns:repeat(5,1fr)">
        <div class="form-group input-suffix" data-suffix="$">
          <label for="amount">Loan Amount</label>
          <input type="number" id="amount" placeholder="300,000" min="0" value="10000000">
        </div>
        <div class="form-group input-suffix" data-suffix="%">
          <label for="rate">Annual Interest Rate</label>
          <input type="number" id="rate" placeholder="6.5" step="0.1" min="0" value="8.3">
        </div>
        <div class="form-group input-suffix" data-suffix="yrs">
          <label for="years">Loan Term</label>
          <input type="number" id="years" placeholder="30" min="1" max="50" value="20">
        </div>
        <div class="form-group">
          <label for="startDate">First EMI Date</label>
          <input type="date" id="startDate">
        </div>
        <div class="form-group input-suffix" data-suffix="$">
          <label for="fixedEmi">Fixed EMI <span style="font-weight:400;color:#aaa">(optional)</span></label>
          <input type="number" id="fixedEmi" placeholder="Auto" min="0" step="0.01">
        </div>
      </div>

      <div class="events-row">
        <div class="event-col">
          <div class="section-label">Prepayments</div>
          <div id="prepayList"></div>
          <button class="outline" id="addPrepay">+ Add Prepayment</button>
        </div>
        <div class="event-col">
          <div class="section-label">Rate Changes</div>
          <div id="rateChangeList"></div>
          <button class="outline" id="addRateChange">+ Add Rate Change</button>
        </div>
        <div class="event-col" style="text-align:right">
          <div class="section-label" style="visibility:hidden">_</div>
          <button class="calc-btn" id="calculate" style="width:100%;max-width:260px">Calculate</button>
          <div class="error" id="error"></div>
          <div class="results" id="results">
            <div class="result-row">
              <span class="result-label">Monthly EMI</span>
              <span class="result-value highlight" id="monthly">$0</span>
            </div>
            <div class="result-row">
              <span class="result-label">Total Payment</span>
              <span class="result-value" id="total">$0</span>
            </div>
            <div class="result-row">
              <span class="result-label">Total Interest</span>
              <span class="result-value" id="interest">$0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="schedule-section" id="scheduleSection">
      <div class="summary">
        <div class="summary-item">
          <div class="label">EMI Paid</div>
          <div class="value paid" id="sumEmi">$0</div>
        </div>
        <div class="summary-item">
          <div class="label">Principal Paid</div>
          <div class="value paid" id="sumPrincipal">$0</div>
        </div>
        <div class="summary-item">
          <div class="label">Interest Paid</div>
          <div class="value paid" id="sumInterest">$0</div>
        </div>
        <div class="summary-item">
          <div class="label">Principal Left</div>
          <div class="value left" id="sumLeft">$0</div>
        </div>
        <div class="summary-item">
          <div class="label">EMIs Left</div>
          <div class="value left" id="sumEmisLeft">0</div>
        </div>
      </div>

      <div class="schedule-header">
        <h2>Month-wise Breakdown</h2>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="scheduleCount"></span>
          <button id="downloadPdf" style="padding:8px 16px;font-size:13px;margin:0;width:auto">Download PDF</button>
        </div>
      </div>
      <div class="schedule-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Due Date</th>
              <th>Rate</th>
              <th>EMI</th>
              <th>Principal</th>
              <th>Interest</th>
              <th>Prepay</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const amountInput = document.getElementById('amount');
    const rateInput = document.getElementById('rate');
    const yearsInput = document.getElementById('years');
    const startDateInput = document.getElementById('startDate');
    const fixedEmiInput = document.getElementById('fixedEmi');
    const calculateBtn = document.getElementById('calculate');
    const resultsDiv = document.getElementById('results');
    const errorDiv = document.getElementById('error');
    const monthlyEl = document.getElementById('monthly');
    const totalEl = document.getElementById('total');
    const interestEl = document.getElementById('interest');
    const scheduleSection = document.getElementById('scheduleSection');
    const scheduleBody = document.getElementById('scheduleBody');
    const scheduleCount = document.getElementById('scheduleCount');
    const sumEmi = document.getElementById('sumEmi');
    const sumPrincipal = document.getElementById('sumPrincipal');
    const sumInterest = document.getElementById('sumInterest');
    const sumLeft = document.getElementById('sumLeft');
    const sumEmisLeft = document.getElementById('sumEmisLeft');
    const currencySelect = document.getElementById('currency');
    const saveBtn = document.getElementById('saveBtn');
    const saveMsg = document.getElementById('saveMsg');
    const prepayList = document.getElementById('prepayList');
    const addPrepayBtn = document.getElementById('addPrepay');
    const rateChangeList = document.getElementById('rateChangeList');
    const addRateBtn = document.getElementById('addRateChange');

    let currencySymbol = '$';
    let prepayments = [];
    let rateChanges = [];

    currencySelect.addEventListener('change', () => {
      currencySymbol = currencySelect.value;
      document.querySelectorAll('.input-suffix[data-suffix]').forEach(el => {
        if (['$', 'R$', '\u00A5', '\u00A3', '\u20AC', '\u20B9'].includes(el.dataset.suffix)) {
          el.dataset.suffix = currencySymbol;
        }
      });
      if (scheduleSection.classList.contains('show')) runCalculation();
    });

    function showSaved() {
      saveMsg.classList.add('show');
      setTimeout(() => saveMsg.classList.remove('show'), 2000);
    }

    function createPrepayEntry(dateVal, amountVal) {
      const div = document.createElement('div');
      div.className = 'event-entry';
      div.innerHTML = `
        <input type="date" class="prepay-date" value="${dateVal || ''}">
        <input type="number" class="prepay-amount" placeholder="Amount" min="0" step="0.01" value="${amountVal || ''}">
        <button class="danger">&times;</button>
      `;
      div.querySelector('.danger').addEventListener('click', () => {
        div.remove();
        rebuildPrepayments();
        if (scheduleSection.classList.contains('show')) runCalculation();
      });
      div.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          rebuildPrepayments();
          if (scheduleSection.classList.contains('show')) runCalculation();
        });
      });
      prepayList.appendChild(div);
      prepayments.push({ date: dateVal || '', amount: amountVal || '' });
    }

    function rebuildPrepayments() {
      const entries = prepayList.querySelectorAll('.event-entry');
      prepayments = [];
      entries.forEach(e => {
        const date = e.querySelector('.prepay-date').value;
        const amount = parseFloat(e.querySelector('.prepay-amount').value);
        if (date && amount > 0) {
          prepayments.push({ date, amount });
        }
      });
    }

    addPrepayBtn.addEventListener('click', () => createPrepayEntry('', ''));

    function createRateEntry(dateVal, rateVal) {
      const div = document.createElement('div');
      div.className = 'event-entry';
      div.innerHTML = `
        <input type="date" class="rate-date" value="${dateVal || ''}">
        <input type="number" class="rate-value" placeholder="Rate %" min="0" step="0.05" value="${rateVal || ''}">
        <button class="danger">&times;</button>
      `;
      div.querySelector('.danger').addEventListener('click', () => {
        div.remove();
        rebuildRateChanges();
        if (scheduleSection.classList.contains('show')) runCalculation();
      });
      div.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          rebuildRateChanges();
          if (scheduleSection.classList.contains('show')) runCalculation();
        });
      });
      rateChangeList.appendChild(div);
      rateChanges.push({ date: dateVal || '', rate: rateVal || '' });
    }

    function rebuildRateChanges() {
      const entries = rateChangeList.querySelectorAll('.event-entry');
      rateChanges = [];
      entries.forEach(e => {
        const date = e.querySelector('.rate-date').value;
        const rate = parseFloat(e.querySelector('.rate-value').value);
        if (date && rate != null && !isNaN(rate)) {
          rateChanges.push({ date, rate });
        }
      });
    }

    addRateBtn.addEventListener('click', () => createRateEntry('', ''));

    function formatMoney(n) {
      if (n == null || isNaN(n)) n = 0;
      return currencySymbol + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function calculateEMI(principal, annualRate, years) {
      const monthlyRate = annualRate / 100 / 12;
      const n = years * 12;
      if (monthlyRate === 0) return principal / n;
      return principal * monthlyRate * Math.pow(1 + monthlyRate, n) / (Math.pow(1 + monthlyRate, n) - 1);
    }

    function addMonths(date, n) {
      const d = new Date(date);
      d.setMonth(d.getMonth() + n);
      return d;
    }

    function formatDate(date) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
    }

    function buildSchedule(principal, annualRate, years, startDate, prepays, rates, fixedEmi) {
      const calculatedEmi = calculateEMI(principal, annualRate, years);
      const emi = fixedEmi > calculatedEmi ? fixedEmi : calculatedEmi;
      const maxMonths = 600;
      const rows = [];
      let balance = principal;
      let currentRate = annualRate;

      const prepayMap = {};
      prepays.forEach(p => {
        const d = new Date(p.date + 'T00:00:00');
        const key = d.getFullYear() + '-' + d.getMonth();
        prepayMap[key] = (prepayMap[key] || 0) + p.amount;
      });

      const sortedRates = [...rates].sort((a, b) => new Date(a.date) - new Date(b.date));
      let rateIdx = 0;

      for (let i = 1; i <= maxMonths; i++) {
        if (balance <= 0) break;
        const dueDate = addMonths(startDate, i - 1);
        const key = dueDate.getFullYear() + '-' + dueDate.getMonth();

        while (rateIdx < sortedRates.length) {
          const rDate = new Date(sortedRates[rateIdx].date + 'T00:00:00');
          if (rDate <= dueDate) {
            currentRate = sortedRates[rateIdx].rate;
            rateIdx++;
          } else break;
        }

        const monthlyRate = currentRate / 100 / 12;
        const interest = balance * monthlyRate;
        let principalPart = emi - interest;
        if (principalPart > balance) principalPart = balance;
        if (principalPart < 0) principalPart = 0;
        balance -= principalPart;

        const prepayAmt = prepayMap[key] || 0;
        if (prepayAmt > 0) balance -= prepayAmt;
        if (balance < 0) balance = 0;

        rows.push({ month: i, dueDate, rate: currentRate, emi, principal: principalPart, interest, prepay: prepayAmt, balance });
        if (balance <= 0) break;
      }
      return rows;
    }

    function calcPaidMonths(startDate, today) {
      const startDay = startDate.getDate();
      const diffMonths = (today.getFullYear() - startDate.getFullYear()) * 12 + (today.getMonth() - startDate.getMonth());
      return today.getDate() >= startDay ? diffMonths + 1 : diffMonths;
    }

    function saveToStorage() {
      rebuildPrepayments();
      rebuildRateChanges();
      const data = {
        amount: amountInput.value,
        rate: rateInput.value,
        years: yearsInput.value,
        startDate: startDateInput.value,
        fixedEmi: fixedEmiInput.value,
        currency: currencySelect.value,
        prepayments: prepayments.filter(p => p.date && p.amount > 0),
        rateChanges: rateChanges.filter(r => r.date && r.rate != null && !isNaN(r.rate) && r.rate > 0)
      };
      localStorage.setItem('loanCalc', JSON.stringify(data));
    }

    function runCalculation() {
      errorDiv.textContent = '';
      const principal = parseFloat(amountInput.value);
      const annualRate = parseFloat(rateInput.value);
      const years = parseFloat(yearsInput.value);
      const startDateVal = startDateInput.value;

      if (!principal || principal <= 0) {
        errorDiv.textContent = 'Please enter a valid loan amount.';
        return;
      }
      if (annualRate == null || annualRate < 0) {
        errorDiv.textContent = 'Please enter a valid interest rate.';
        return;
      }
      if (!years || years <= 0) {
        errorDiv.textContent = 'Please enter a valid loan term.';
        return;
      }
      if (!startDateVal) {
        errorDiv.textContent = 'Please select a start date.';
        return;
      }

      const startDate = new Date(startDateVal + 'T00:00:00');
      const today = new Date();
      const paidMonths = Math.min(Math.max(0, calcPaidMonths(startDate, today)), years * 12);

      const calculatedEmi = calculateEMI(principal, annualRate, years);
      const fixedEmi = parseFloat(fixedEmiInput.value);

      if (fixedEmiInput.value && (isNaN(fixedEmi) || fixedEmi < calculatedEmi)) {
        errorDiv.textContent = 'Fixed EMI must be greater than or equal to ' + formatMoney(calculatedEmi) + '.';
        return;
      }

      const emi = fixedEmi > calculatedEmi ? fixedEmi : calculatedEmi;
      const totalPaid = emi * years * 12;
      const totalInterest = totalPaid - principal;

      monthlyEl.textContent = formatMoney(emi);
      totalEl.textContent = formatMoney(totalPaid);
      interestEl.textContent = formatMoney(totalInterest);
      resultsDiv.classList.add('show');

      saveToStorage();

      const validPrepayments = prepayments.filter(p => p.date && p.amount > 0);
      const validRates = rateChanges.filter(r => r.date && r.rate != null && !isNaN(r.rate) && r.rate > 0);
      const data = buildSchedule(principal, annualRate, years, startDate, validPrepayments, validRates, fixedEmi);
      renderSchedule(data, paidMonths, validPrepayments.length > 0, validRates.length > 0);
      scheduleSection.classList.add('show');
    }

    function renderSchedule(rows, paidMonths, hasPrepay, hasRateChanges) {
      let emiPaid = 0, principalPaid = 0, interestPaid = 0;
      let currentBalance = 0;
      let prevRate = rows.length > 0 ? rows[0].rate : null;

      scheduleBody.innerHTML = rows.map((r, idx) => {
        const isPaid = idx < paidMonths;
        const isCurrent = idx === paidMonths;
        const hasPrepayThis = r.prepay > 0;
        const rateChanged = r.rate !== prevRate;
        if (rateChanged) prevRate = r.rate;
        if (isPaid) {
          emiPaid += r.emi;
          principalPaid += r.principal;
          interestPaid += r.interest;
        }
        if (idx === paidMonths - 1) currentBalance = r.balance;
        let cls = isPaid ? 'paid' : isCurrent ? 'active' : '';
        if (hasPrepayThis) cls = (cls ? cls + ' ' : '') + 'prepay';
        if (rateChanged && idx > 0) cls = (cls ? cls + ' ' : '') + 'rate-change';
        return `
        <tr class="${cls}">
          <td>${r.month}</td>
          <td>${formatDate(r.dueDate)}</td>
          <td>${r.rate}%</td>
          <td>${formatMoney(r.emi)}</td>
          <td>${formatMoney(r.principal)}</td>
          <td>${formatMoney(r.interest)}</td>
          <td>${hasPrepayThis ? formatMoney(r.prepay) : '-'}</td>
          <td>${formatMoney(r.balance)}</td>
        </tr>`;
      }).join('');

      if (paidMonths === 0 && rows.length > 0) currentBalance = rows[0].balance;
      else if (paidMonths > rows.length) currentBalance = 0;

      const extras = (hasPrepay ? ' with prepayments' : '') + (hasRateChanges ? ' with rate changes' : '');
      scheduleCount.textContent = rows.length + ' months' + extras;
      sumEmi.textContent = formatMoney(emiPaid);
      sumPrincipal.textContent = formatMoney(principalPaid);
      sumInterest.textContent = formatMoney(interestPaid);
      sumLeft.textContent = formatMoney(currentBalance);
      sumEmisLeft.textContent = rows.length - paidMonths;
    }

    calculateBtn.addEventListener('click', runCalculation);

    saveBtn.addEventListener('click', () => {
      rebuildPrepayments();
      rebuildRateChanges();
      saveToStorage();
      showSaved();
    });

    function loadFromStorage() {
      const raw = localStorage.getItem('loanCalc');
      if (!raw) return false;
      try {
        const data = JSON.parse(raw);
        if (data.amount) amountInput.value = data.amount;
        if (data.rate) rateInput.value = data.rate;
        if (data.years) yearsInput.value = data.years;
        if (data.startDate) startDateInput.value = data.startDate;
        if (data.fixedEmi) fixedEmiInput.value = data.fixedEmi;
        if (data.currency) {
          currencySelect.value = data.currency;
          currencySymbol = data.currency;
          document.querySelectorAll('.input-suffix[data-suffix]').forEach(el => {
            if (['$', 'R$', '\u00A5', '\u00A3', '\u20AC', '\u20B9'].includes(el.dataset.suffix)) {
              el.dataset.suffix = currencySymbol;
            }
          });
        }
        if (data.prepayments && data.prepayments.length) {
          prepayList.innerHTML = '';
          prepayments = [];
          data.prepayments.forEach(p => createPrepayEntry(p.date, p.amount));
        }
        if (data.rateChanges && data.rateChanges.length) {
          rateChangeList.innerHTML = '';
          rateChanges = [];
          data.rateChanges.forEach(r => createRateEntry(r.date, r.rate));
        }
        return true;
      } catch(e) {
        return false;
      }
    }

    if (!loadFromStorage()) {
      startDateInput.value = '2024-04-05';
    }

    document.getElementById('downloadPdf').addEventListener('click', () => {
      const btn = document.getElementById('downloadPdf');
      const origText = btn.textContent;
      btn.textContent = 'Generating...';
      btn.disabled = true;

      const wrap = document.querySelector('.schedule-wrap');
      const origMaxH = wrap.style.maxHeight;
      const origOverflow = wrap.style.overflow;
      wrap.style.maxHeight = 'none';
      wrap.style.overflow = 'visible';

      const formSummary = document.createElement('div');
      formSummary.style.cssText = 'padding:0 0 16px 0;font-family: sans-serif;';
      let eventsHtml = '';
      const validPrepay = prepayments.filter(p => p.date && p.amount > 0);
      const validRates = rateChanges.filter(r => r.date && r.rate != null && !isNaN(r.rate) && r.rate > 0);
      if (validPrepay.length) {
        eventsHtml += '<div style="margin-top:6px"><strong>Prepayments:</strong> ' +
          validPrepay.map(p => formatDate(new Date(p.date + 'T00:00:00')) + ' - ' + formatMoney(p.amount)).join(' | ') + '</div>';
      }
      if (validRates.length) {
        eventsHtml += '<div style="margin-top:6px"><strong>Rate Changes:</strong> ' +
          validRates.map(r => formatDate(new Date(r.date + 'T00:00:00')) + ' - ' + r.rate + '%').join(' | ') + '</div>';
      }
      formSummary.innerHTML = `
        <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:#333;margin-bottom:12px">
          <div><strong>Loan Amount:</strong> ${formatMoney(parseFloat(amountInput.value))}</div>
          <div><strong>Rate:</strong> ${rateInput.value}%</div>
          <div><strong>Term:</strong> ${yearsInput.value} yrs</div>
          <div><strong>Start Date:</strong> ${formatDate(new Date(startDateInput.value + 'T00:00:00'))}</div>
          <div><strong>EMI:</strong> ${monthlyEl.textContent}</div>
        </div>
        ${eventsHtml}
      `;

      const clone = document.getElementById('scheduleSection').cloneNode(true);
      const summaryClone = formSummary;
      const pdfContainer = document.createElement('div');
      pdfContainer.style.cssText = 'padding:20px;background:white;';
      pdfContainer.appendChild(summaryClone);
      pdfContainer.appendChild(clone);

      const hidden = document.createElement('div');
      hidden.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:10000';
      hidden.appendChild(pdfContainer);
      document.body.appendChild(hidden);

      html2pdf().set({
        margin: 0.4,
        filename: 'loan-schedule.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
      }).from(pdfContainer).save().then(() => {
        document.body.removeChild(hidden);
        wrap.style.maxHeight = origMaxH;
        wrap.style.overflow = origOverflow;
        btn.textContent = origText;
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
